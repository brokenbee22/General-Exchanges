{% extends 'base.html' %}

{% block content %}
<div class="form-card wide">
    <h1>{{ title }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Product</button>
        <a href="{% url 'seller_dashboard' %}" class="button-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
