{% extends 'base.html' %}

{% block content %}
<div class="form-card">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="muted">Need a seller account? <a href="{% url 'seller_register' %}">Register here</a>.</p>
</div>
{% endblock %}
